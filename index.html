<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Task Dashboard</title>
    <link rel="stylesheet" href="609a232ab53e413e38d2.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  <script defer src="main.js"></script></head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="brand"><span class="logo-text">Dash</span>board</div>

        <div class="user-profile">
          <div class="avatar-container">
            <img
              src="https://images.unsplash.com/photo-1612916628677-475f676a6adf?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="Sundar Gurung"
            />
          </div>
          <h3>Anudit Jangid</h3>
          <p>anuditjangid@gmail.com</p>
        </div>

        <div class="nav-menu">
          <nav class="nav-menu-list">
            <a href="#" class="nav-item">Dashboard</a>
            <a href="#" class="nav-item">My Task</a>
            <a href="#" class="nav-item">Tomorrow</a>
          </nav>
          <div class="projects"></div>
        </div>

        <div class="add-project-section">
          <label for="add-project-toggle" class="add-project-btn">
            <span>+</span> Add Project
          </label>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-header">
          <div class="search-bar">
            <input type="text" placeholder="Search your task here..." />
          </div>
        </header>

        <section class="welcome-section">
          <h1>Welcome back, Anudit 👋</h1>
        </section>

        <div class="content-grid">
          <section class="todo-column">
            <div class="column-header">
              <h2 class="todo-heading">To-Do</h2>
              <button class="add-task-btn">+ Add task</button>
            </div>
            <div class="task-container"></div>
          </section>
        </div>
      </main>
    </div>

    <input type="checkbox" id="add-project-toggle" class="hidden-toggle" />

    <div class="modal-overlay">
      <div class="modal-card">
        <label for="add-project-toggle" class="close-modal">&times;</label>

        <h2>Create New Project</h2>
        <p>Set up a new project space to organize related tasks.</p>

        <form class="modal-form" action="#">
          <div class="form-group">
            <label>Project Title</label>
            <input
              type="text"
              placeholder="e.g., Q3 Marketing Campaign"
              required
            />
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea
              placeholder="Briefly describe the project goals..."
              rows="3"
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Deadline</label>
              <input type="date" required />
            </div>
            <div class="form-group">
              <label>Priority</label>
              <select class="modal-select">
                <option value="high">High</option>
                <option value="moderate" selected>Moderate</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>

          <button type="submit" class="submit-btn">Create Project</button>
        </form>
      </div>
    </div>

    <template id="task-card-template">
      <div class="task-card">
        <div class="priority-ring"></div>
        <div class="task-content">
          <div class="task-top-row">
            <h3 class="task-title"></h3>
            <button class="delete-task-btn">&times;</button>
          </div>
          <p class="task-description"></p>
          <div class="task-meta">
            <div class="control-group">
              <span class="meta-label">Priority:</span>
              <div class="select-wrapper priority-wrapper">
                <select class="priority-select">
                  <option value="high">High</option>
                  <option value="moderate">Moderate</option>
                  <option value="low">Low</option>
                </select>
              </div>
            </div>
            <div class="control-group checkbox-group">
              <label class="custom-checkbox">
                <input type="checkbox" class="completed-checkbox" />
                <span class="checkmark"></span>
                <span class="checkbox-label">Completed</span>
              </label>
            </div>
            <span class="due-date"></span>
          </div>
        </div>
      </div>
    </template>

    <script type="module" src="d0110fffb23c4bdfa841.js"></script>
  </body>
</html>
